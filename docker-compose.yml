services:
  postgres:
    image: postgres:16-alpine
    container_name: aquapilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aquapilot
      POSTGRES_USER: aquapilot
      POSTGRES_PASSWORD: aquapilot
    ports:
      - "5432:5432"
    volumes:
      - aquapilot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquapilot -d aquapilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aquapilot_postgres_data:
